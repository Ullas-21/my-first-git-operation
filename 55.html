<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Male Profile Sample</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 120px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/120" alt="Profile Picture">
    <h2>John Doe</h2>
    <p><strong>Gender:</strong> Male</p>
    <p><strong>Age:</strong> 25</p>
    <p><strong>Profession:</strong> Software Developer</p>
</div>

</body>
</html>
